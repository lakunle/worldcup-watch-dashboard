<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Cup 2026 Watch Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">World Cup 2026</p>
      <h1>Watch Dashboard</h1>
      <p class="sub">All fixtures, IPTV channel notes, Manchester United-player alerts, scores, stats and highlights.</p>
    </div>
    <div class="hero-card">
      <div id="nextUnitedLabel" class="label">Next United-interest match</div>
      <div id="nextUnitedMatch" class="next-match">Loading…</div>
    </div>
  </header>

  <main>
    <section class="controls" aria-label="Filters">
      <input id="search" type="search" placeholder="Search team, venue, channel…" />
      <select id="stageFilter">
        <option value="all">All stages</option>
        <option value="Group stage">Group stage</option>
        <option value="Knockout stage">Knockout stage</option>
      </select>
      <select id="statusFilter">
        <option value="all">All statuses</option>
        <option value="scheduled">Scheduled</option>
        <option value="completed">Completed</option>
      </select>
      <label class="checkbox"><input id="unitedOnly" type="checkbox" /> Man United only</label>
    </section>

    <section class="summary" id="summary"></section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Match</th>
            <th>Date / time</th>
            <th>Fixture</th>
            <th>Venue</th>
            <th>Watch US</th>
            <th>Watch UK</th>
            <th>Result / stats</th>
          </tr>
        </thead>
        <tbody id="matchRows"></tbody>
      </table>
    </section>
  </main>

  <template id="rowTemplate">
    <tr>
      <td class="match-meta"></td>
      <td class="date-cell"></td>
      <td class="fixture-cell"></td>
      <td class="venue-cell"></td>
      <td class="broadcast-us"></td>
      <td class="broadcast-uk"></td>
      <td class="result-cell"></td>
    </tr>
  </template>

  <script src="app.js" type="module"></script>
</body>
</html>
